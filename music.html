<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线音乐</title>
    <link rel="icon" href="./static/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); overflow-x: hidden; }
        .particle { position: fixed; width: 4px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 50%; animation: float 15s infinite; pointer-events: none; }
        @keyframes float { 0%,100% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; }
        .back-btn { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; padding: 10px 16px; border-radius: 20px; background: rgba(255,255,255,0.1); transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); color: white; }
        .header h1 { color: white; font-size: 20px; font-weight: 500; letter-spacing: 2px; }
        .music-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border-radius: 24px; padding: 30px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .album-section { display: flex; gap: 30px; align-items: center; margin-bottom: 20px; }
        .album-cover { width: 180px; height: 180px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.4); position: relative; flex-shrink: 0; }
        .album-cover img { width: 100%; height: 100%; object-fit: cover; }
        .album-cover.playing img { animation: rotate 20s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .album-info { flex: 1; min-width: 0; }
        .song-title { font-size: 24px; font-weight: 600; color: white; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 15px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; margin-bottom: 8px; position: relative; overflow: hidden; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: linear-gradient(90deg,#7877f5,#ff77c6); border-radius: 3px; transition: width 0.1s; }
        .time-display { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 15px; }
        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .control-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .control-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .play-btn { width: 70px; height: 70px; background: linear-gradient(135deg,#7877f5,#ff77c6); font-size: 24px; box-shadow: 0 5px 30px rgba(120,119,255,0.4); }
        .play-btn:hover { box-shadow: 0 8px 40px rgba(120,119,255,0.6); }
        .volume-section { display: flex; align-items: center; gap: 10px; padding: 0 20px; }
        .volume-icon { color: rgba(255,255,255,0.6); font-size: 16px; cursor: pointer; }
        .volume-slider { flex: 1; height: 4px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: white; cursor: pointer; }
        .sheet-section { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .sheet-header { color: white; font-size: 16px; font-weight: 500; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sheet-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(120px,1fr)); gap: 15px; }
        .sheet-item { background: rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .sheet-item:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(120,119,255,0.3); }
        .sheet-item img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .sheet-item .name { padding: 10px; color: white; font-size: 12px; text-align: center; }
        .playlist-section { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; max-height: 400px; overflow-y: auto; }
        .playlist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .playlist-title { color: white; font-size: 16px; font-weight: 500; }
        .playlist-count { color: rgba(255,255,255,0.5); font-size: 12px; }
        .playlist-item { display: flex; align-items: center; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-bottom: 8px; }
        .playlist-item:hover { background: rgba(255,255,255,0.1); }
        .playlist-item.playing { background: linear-gradient(135deg,rgba(120,119,255,0.3),rgba(255,119,198,0.2)); }
        .playlist-item .num { width: 30px; color: rgba(255,255,255,0.4); font-size: 14px; text-align: center; }
        .playlist-item.playing .num { color: #7877f5; }
        .playlist-item .cover { width: 50px; height: 50px; border-radius: 10px; overflow: hidden; margin-right: 12px; flex-shrink: 0; background: #333; display: flex; align-items: center; justify-content: center; }
        .playlist-item .cover i { color: rgba(255,255,255,0.3); font-size: 20px; }
        .playlist-item .info { flex: 1; min-width: 0; }
        .playlist-item .name { color: white; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .playlist-item .artist { color: rgba(255,255,255,0.5); font-size: 12px; }
        .playlist-item .duration { color: rgba(255,255,255,0.4); font-size: 12px; margin-left: 10px; }
        @media (max-width:600px) { .album-section { flex-direction: column; text-align: center; } .album-cover { width: 200px; height: 200px; } .sheet-grid { grid-template-columns: repeat(2,1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="./" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
            <h1>🎵 在线音乐</h1>
            <div style="width:80px"></div>
        </header>
        <div class="music-card">
            <div class="album-section">
                <div class="album-cover" id="albumCover"><img src="./static/img/logo.png" alt="封面"></div>
                <div class="album-info">
                    <div class="song-title" id="songTitle">点击播放开始</div>
                    <div class="song-artist" id="songArtist">选择一个歌单</div>
                    <div class="progress-bar" id="progressBar" onclick="seekProgress(event)">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                    <div class="controls">
                        <button class="control-btn" onclick="prevTrack()"><i class="fas fa-step-backward"></i></button>
                        <button class="control-btn play-btn" onclick="togglePlay()"><i class="fas fa-play" id="playIcon"></i></button>
                        <button class="control-btn" onclick="nextTrack()"><i class="fas fa-step-forward"></i></button>
                    </div>
                    <div class="volume-section">
                        <i class="fas fa-volume-up volume-icon" onclick="toggleMute()"></i>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" onchange="setVolume(this.value)">
                    </div>
                </div>
            </div>
        </div>
        <div class="sheet-section">
            <div class="sheet-header">🎶 歌单列表</div>
            <div class="sheet-grid" id="sheetGrid">
                <div class="sheet-item" onclick="loadPlaylist(3778678)"><img src="https://p1.music.126.net/0SUEG8yDACfx0Bw2MYFv4Q==/109951170048519512.jpg?param=200y200" alt=""><div class="name">云热歌榜</div></div>
                <div class="sheet-item" onclick="loadPlaylist(19723756)"><img src="https://p1.music.126.net/rIi7Qzy2i2Y_1QD7cd0MYA==/109951170048506929.jpg?param=200y200" alt=""><div class="name">云飙升榜</div></div>
                <div class="sheet-item" onclick="loadPlaylist(3779629)"><img src="https://p1.music.126.net/5guhqPBTcIrrhLBotgaT6w==/109951170048511751.jpg?param=200y200" alt=""><div class="name">云新歌榜</div></div>
                <div class="sheet-item" onclick="loadPlaylist(2884035)"><img src="https://p1.music.126.net/BaP9nrocNTL3gGThysv4eQ==/109951170091896587.jpg?param=200y200" alt=""><div class="name">云原创榜</div></div>
                <div class="sheet-item" onclick="loadPlaylist(6723173524)"><img src="https://p1.music.126.net/_kSxOPqQ5J5etC5DKTFwNA==/109951170048519530.jpg?param=200y200" alt=""><div class="name">网络热歌榜</div></div>
                <div class="sheet-item" onclick="loadPlaylist(6688069460)"><img src="https://p1.music.126.net/wJVUAiUuykKk7yGbQxDBug==/109951167430857712.jpg?param=200y200" alt=""><div class="name">听歌识别榜</div></div>
                <div class="sheet-item" onclick="loadPlaylist(991319590)"><img src="https://p1.music.126.net/tJUsQEQvh51WpP65bmaTCQ==/109951170091890381.jpg?param=200y200" alt=""><div class="name">说唱榜</div></div>
                <div class="sheet-item" onclick="loadPlaylist(6886768100)"><img src="https://p1.music.126.net/w_01BfDU012ojxnzLO6tYw==/109951167977358686.jpg?param=200y200" alt=""><div class="name">中文DJ榜</div></div>
            </div>
        </div>
        <div class="playlist-section">
            <div class="playlist-header"><span class="playlist-title">📋 当前播放列表</span><span class="playlist-count" id="playlistCount">选择一个歌单</span></div>
            <div id="playlistContainer"><div class="playlist-item"><span class="num">1</span><div class="cover"><i class="fas fa-music"></i></div><div class="info"><div class="name">请选择上面的歌单</div><div class="artist">点击歌单开始播放</div></div><span class="duration">--:--</span></div></div>
        </div>
    </div>
    <audio id="audioPlayer" preload="auto"></audio>
    <script>
        var audio = document.getElementById('audioPlayer');
        var playlist = [];
        var currentIndex = 0;
        var isPlaying = false;
        var currentPlaylistId = null;

        function formatTime(s) { if(isNaN(s))return'0:00';return Math.floor(s/60)+':'+Math.floor(s%60).toString().padStart(2,'0'); }
        
        function togglePlay() {
            if(playlist.length===0){loadPlaylist(3778678);return;}
            if(isPlaying){audio.pause();}else{if(audio.src){audio.play();}else{playTrack(0);}}
        }
        function prevTrack(){var ni=currentIndex>0?currentIndex-1:playlist.length-1;playTrack(ni);}
        function nextTrack(){var ni=currentIndex<playlist.length-1?currentIndex+1:0;playTrack(ni);}
        function setVolume(v){audio.volume=v/100;}
        function toggleMute(){if(audio.volume>0){audio.volume=0;document.getElementById('volumeSlider').value=0;}else{audio.volume=0.8;document.getElementById('volumeSlider').value=80;}}
        function seekProgress(e){if(!audio.duration)return;var rect=e.target.getBoundingClientRect();var p=(e.clientX-rect.left)/rect.width;audio.currentTime=p*audio.duration;}
        
        function playTrack(index) {
            if(index<0||index>=playlist.length)return;
            currentIndex=index;
            var song=playlist[index];
            audio.src=song.url;
            audio.play();
            document.getElementById('songTitle').textContent=song.name;
            document.getElementById('songArtist').textContent=song.artist;
            document.getElementById('albumCover').querySelector('img').src=song.pic;
            document.getElementById('albumCover').classList.add('playing');
            document.getElementById('playIcon').className='fas fa-pause';
            isPlaying=true;
            renderPlaylist();
        }
        
        function renderPlaylist() {
            var html='';
            for(var i=0;i<playlist.length;i++){
                var cls=i===currentIndex?'playlist-item playing':'playlist-item';
                html+='<div class="'+cls+'" onclick="playTrack('+i+')"><span class="num">'+(i+1)+'</span><div class="cover"><i class="fas fa-music"></i></div><div class="info"><div class="name">'+playlist[i].name+'</div><div class="artist">'+playlist[i].artist+'</div></div><span class="duration">'+playlist[i].duration+'</span></div>';
            }
            document.getElementById('playlistContainer').innerHTML=html;
        }
        
        function loadPlaylist(pid) {
            if(currentPlaylistId===pid&&playlist.length>0)return;
            currentPlaylistId=pid;
            document.getElementById('playlistCount').textContent='加载中...';
            document.getElementById('albumCover').querySelector('img').src='https://p1.music.126.net/0SUEG8yDACfx0Bw2MYFv4Q==/109951170048519512.jpg?param=200y200';
            
            var url='https://api.injahow.cn/meting/?server=netease&type=playlist&id='+pid;
            fetch(url).then(r=>r.json()).then(data=>{
                playlist=data.map(s=>({name:s.name,artist:s.artist||'未知',url:s.url,pic:s.pic,duration:formatTime(s.duration||0)}));
                document.getElementById('playlistCount').textContent=playlist.length+' 首歌曲';
                renderPlaylist();
                playTrack(0);
            }).catch(e=>{
                document.getElementById('playlistCount').textContent='加载失败';
                document.getElementById('songTitle').textContent='加载失败';
            });
        }
        
        audio.ontimeupdate=function(){
            var p=(audio.currentTime/audio.duration)*100;
            document.getElementById('progressFill').style.width=p+'%';
            document.getElementById('currentTime').textContent=formatTime(audio.currentTime);
            document.getElementById('duration').textContent=formatTime(audio.duration);
        };
        audio.onended=function(){nextTrack();};
        audio.onplay=function(){document.getElementById('playIcon').className='fas fa-pause';document.getElementById('albumCover').classList.add('playing');isPlaying=true;};
        audio.onpause=function(){document.getElementById('playIcon').className='fas fa-play';document.getElementById('albumCover').classList.remove('playing');isPlaying=false;};
        
        for(var i=0;i<15;i++){
            var p=document.createElement('div');
            p.className='particle';
            p.style.left=Math.random()*100+'%';
            p.style.animationDelay=Math.random()*15+'s';
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
