<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线音乐</title>
    <link rel="icon" href="./static/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./static/css/all.min.css">
    <link rel="stylesheet" href="./static/css/music-player.css">
</head>
<body>
    <div class="player-container">
        <div class="player-header">
            <a href="./" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
            <h1 class="player-title">在线音乐</h1>
        </div>

        <div class="player-main">
            <div class="album-art">
                <img src="./static/img/logo.png" alt="Album Art" id="albumCover">
                <div class="album-overlay">
                    <i class="fas fa-music"></i>
                </div>
            </div>

            <div class="song-info">
                <h2 class="song-title" id="songTitle">选择一首歌曲开始播放</h2>
                <p class="song-artist" id="songArtist">--</p>
            </div>

            <div class="progress-container">
                <span class="time current" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time duration" id="duration">0:00</span>
            </div>

            <div class="controls">
                <button class="control-btn" id="prevBtn" title="上一首">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn play-btn" id="playBtn" title="播放/暂停">
                    <i class="fas fa-play" id="playIcon"></i>
                </button>
                <button class="control-btn" id="nextBtn" title="下一首">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>

            <div class="volume-control">
                <i class="fas fa-volume-up" id="volumeIcon"></i>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
            </div>
        </div>

        <div class="playlist">
            <h3 class="playlist-title">播放列表</h3>
            <div class="playlist-items" id="playlist">
                <!-- 占位符：歌曲列表，可自行修改 -->
                <div class="playlist-item active" data-index="0">
                    <span class="song-num">1</span>
                    <div class="playlist-song-info">
                        <span class="playlist-song-name">占位符歌曲 1</span>
                        <span class="playlist-song-artist">占位符歌手</span>
                    </div>
                    <span class="playlist-song-duration">3:45</span>
                </div>
                <div class="playlist-item" data-index="1">
                    <span class="song-num">2</span>
                    <div class="playlist-song-info">
                        <span class="playlist-song-name">占位符歌曲 2</span>
                        <span class="playlist-song-artist">占位符歌手</span>
                    </div>
                    <span class="playlist-song-duration">4:12</span>
                </div>
                <div class="playlist-item" data-index="2">
                    <span class="song-num">3</span>
                    <div class="playlist-song-info">
                        <span class="playlist-song-name">占位符歌曲 3</span>
                        <span class="playlist-song-artist">占位符歌手</span>
                    </div>
                    <span class="playlist-song-duration">3:28</span>
                </div>
                <div class="playlist-item" data-index="3">
                    <span class="song-num">4</span>
                    <div class="playlist-song-info">
                        <span class="playlist-song-name">占位符歌曲 4</span>
                        <span class="playlist-song-artist">占位符歌手</span>
                    </div>
                    <span class="playlist-song-duration">5:01</span>
                </div>
                <div class="playlist-item" data-index="4">
                    <span class="song-num">5</span>
                    <div class="playlist-song-info">
                        <span class="playlist-song-name">占位符歌曲 5</span>
                        <span class="playlist-song-artist">占位符歌手</span>
                    </div>
                    <span class="playlist-song-duration">3:56</span>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="auto"></audio>

    <script src="./static/js/music-player.js"></script>
</body>
</html>
