<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线音乐</title>
    <link rel="icon" href="./static/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.css">
    <link rel="stylesheet" href="./static/css/music-player.css">
</head>
<body>
    <div class="player-container">
        <div class="player-header">
            <a href="./" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
            <h1 class="player-title">在线音乐</h1>
        </div>

        <div class="player-main">
            <div id="aplayer"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/meting@2.0.1/dist/Meting.min.js"></script>
    <script>
    const ap = new APlayer({
        container: document.getElementById('aplayer'),
        theme: '#667eea',
        loop: 'all',
        order: 'list',
        preload: 'auto',
        volume: 0.8,
        listFolded: false,
        listMaxHeight: 300,
        audio: [
            {
                name: '云音乐热歌榜',
                artist: '网易云音乐',
                url: 'https://api.injahow.cn/meting/?server=netease&type=playlist&id=3778678',
                cover: '',
                lrc: '',
                type: 'netease'
            }
        ]
    });

    fetch('https://api.injahow.cn/meting/?server=netease&type=playlist&id=3778678')
        .then(res => res.json())
        .then(data => {
            ap.list.clear();
            ap.list.add(data.map(song => ({
                name: song.name,
                artist: song.artist,
                url: song.url,
                cover: song.pic,
                lrc: song.lrc
            })));
            ap.list.switch(0);
        })
        .catch(() => {
            ap.list.clear();
            ap.list.add([
                { name: '歌曲加载失败', artist: '请检查网络', url: '', cover: '', lrc: '' }
            ]);
        });
    </script>
</body>
</html>
